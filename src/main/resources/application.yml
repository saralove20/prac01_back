jwt:
  secret: ${JWT_SECRET}
  expire: ${JWT_EXPIRE}

project:
  upload:
    path: ${UPLOAD_PATH}

  aes:
    key: aessecretkey01234567890123456789

spring:
  datasource:
    master:
      driver-class-name: org.mariadb.jdbc.Driver
      username: root
      password: qwer1234
      jdbc-url: jdbc:mariadb://192.168.193.101:3306/master
    slave:
      driver-class-name: org.mariadb.jdbc.Driver
      username: root
      password: qwer1234
      jdbc-url: jdbc:mariadb://192.168.193.102:3306/slave

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-name: kakao
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code  # 카카오 문서 보면 이렇게 지정하라고 함
            scope: profile_nickname   # 받아올 항목
            client-authentication-method: client_secret_post  # 통신 방식
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize  # 인가 코드 받기 요청 uri
            token-uri: https://kauth.kakao.com/oauth/token    # 토큰 받기 요청 uri
            user-info-uri: https://kapi.kakao.com/v2/user/me  # 사용자 정보 조회하기 요청 uri
            user-name-attribute: id

  application:
    name: spring04

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket: java-architecture-practice
      region:
        static: ap-northeast-2

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
